"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = "$username$hostname$directory$git_branch$git_status$nodejs$rust$golang$python$docker_context$jobs$time$character"

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg0 = '#282828'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#83a598'
color_aqua = '#8ec07c'
color_green = '#b8bb26'
color_orange = '#fe8019'
color_purple = '#d3869b'
color_red = '#fb4934'
color_yellow = '#fabd2f'
color_gray = '#928374'

# [os]
# disabled = false
# style = "fg:color_fg0"
# format = "[$symbol]($style)"
#
# [os.symbols]
# Ubuntu = " "
# Linux = " "
# Arch = "󰣇 "
# Fedora = "󰣛 "
# Debian = "󰣚 "

[username]
show_always = true
style_user = "fg:color_orange bold"
style_root = "fg:color_red bold"
format = '[$user]($style) '

[directory]
style = "fg:color_blue bold"
format = "in [$path]($style) "
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "fg:color_aqua bold"
format = "on [$symbol$branch]($style) "

[git_status]
style = "fg:color_red bold"
format = '[$all_status$ahead_behind]($style) '

[nodejs]
symbol = " "
style = "fg:color_green bold"
format = "via [$symbol($version )]($style)"

[rust]
symbol = " "
style = "fg:color_orange bold"
format = "via [$symbol($version )]($style)"

[golang]
symbol = " "
style = "fg:color_blue bold"
format = "via [$symbol($version )]($style)"

[python]
symbol = " "
style = "fg:color_yellow bold"
format = "via [$symbol($version )]($style)"

[docker_context]
symbol = " "
style = "fg:color_blue bold"
format = "on [$symbol$context]($style) "

[time]
disabled = false
time_format = "%R"
style = "fg:color_gray"
format = 'at [$time]($style) '

[character]
success_symbol = "[󰄾](bold fg:color_green)"
error_symbol = "[󰄾](bold fg:color_red)"
vicmd_symbol = "[󰄼](bold fg:color_yellow)"

[jobs]
symbol = " "
style = "fg:color_red bold"
format = "[$symbol$number]($style) "
